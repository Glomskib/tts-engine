<!doctype html>
<!-- Offline fallback served by sw.js when a page navigation fails.
     Self-contained on purpose: no external CSS/JS/fonts, because by
     definition the network is down when this renders. Styling mirrors the
     app's dark zinc + teal theme. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14b8a6" />
  <title>Offline — FlashFlow AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .card { max-width: 360px; }
    .icon { width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 20px; display: block; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #a1a1aa; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #14b8a6; color: #09090b; border: 0; border-radius: 10px;
      padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #2dd4bf; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="/icons/icon-192.png" alt="FlashFlow AI" />
    <h1>You&rsquo;re offline</h1>
    <p>FlashFlow needs a connection to load this page. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
